<!DOCTYPE html>
<html lang="bg">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ЗАЕДНО — Огнище</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --cream: #F7F3EE;
  --warm-white: #FDFAF7;
  --amber: #C4785A;
  --amber-light: #E8C4B0;
  --amber-pale: #FAF0EA;
  --amber-deep: #8B4513;
  --sage: #8FA88A;
  --sage-pale: #EBF2E9;
  --stone: #8C8478;
  --stone-dark: #4A4440;
  --mist: #B8C4BE;
  --glow: rgba(196, 120, 90, 0.15);
}

body {
  font-family: 'Jost', sans-serif;
  background: var(--cream);
  color: var(--stone-dark);
  min-height: 100vh;
}

/* Топло фоново сияние */
body::before {
  content: '';
  position: fixed;
  top: -20%;
  left: 50%;
  transform: translateX(-50%);
  width: 80vw;
  height: 60vh;
  background: radial-gradient(ellipse, rgba(196,120,90,0.12) 0%, transparent 70%);
  pointer-events: none;
  z-index: 0;
}

nav {
  position: relative;
  z-index: 10;
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 2rem 4rem;
  border-bottom: 1px solid rgba(184,196,190,0.2);
}
.logo {
  font-family: 'Cormorant Garamond', serif;
  font-size: 1.6rem;
  font-weight: 600;
  color: var(--stone-dark);
  letter-spacing: 0.12em;
  text-decoration: none;
}
.logo span { color: var(--amber); }
.nav-links { display: flex; gap: 2rem; }
.nav-links a {
  font-size: 0.85rem;
  color: var(--stone);
  text-decoration: none;
  letter-spacing: 0.08em;
  transition: color 0.2s;
}
.nav-links a:hover { color: var(--stone-dark); }

.page-wrap {
  position: relative;
  z-index: 1;
  max-width: 780px;
  margin: 0 auto;
  padding: 4rem 2rem 8rem;
}

.back-link {
  display: inline-flex;
  align-items: center;
  gap: 0.4rem;
  font-size: 0.82rem;
  color: var(--amber);
  text-decoration: none;
  letter-spacing: 0.08em;
  margin-bottom: 3rem;
  transition: opacity 0.2s;
}
.back-link:hover { opacity: 0.7; }

/* Огнище хедър */
.fire-header {
  text-align: center;
  margin-bottom: 3rem;
  padding: 3rem 2rem;
  background: var(--warm-white);
  border-radius: 2rem;
  border: 1px solid rgba(196,120,90,0.15);
  box-shadow: 0 8px 40px rgba(196,120,90,0.08);
  position: relative;
  overflow: hidden;
}

.fire-header::before {
  content: '';
  position: absolute;
  bottom: 0;
  left: 0;
  right: 0;
  height: 3px;
  background: linear-gradient(90deg, transparent, var(--amber), transparent);
}

.fire-emoji {
  font-size: 4rem;
  margin-bottom: 1.5rem;
  display: block;
  animation: flicker 3s ease-in-out infinite;
}

@keyframes flicker {
  0%, 100% { transform: scale(1) rotate(-1deg); }
  25% { transform: scale(1.05) rotate(1deg); }
  50% { transform: scale(0.98) rotate(-0.5deg); }
  75% { transform: scale(1.03) rotate(0.5deg); }
}

.fire-label {
  font-size: 0.65rem;
  font-weight: 500;
  letter-spacing: 0.4em;
  text-transform: uppercase;
  color: var(--amber);
  margin-bottom: 0.75rem;
  display: block;
}

.fire-name {
  font-family: 'Cormorant Garamond', serif;
  font-size: clamp(1.8rem, 4vw, 2.8rem);
  font-weight: 400;
  line-height: 1.15;
  color: var(--stone-dark);
  margin-bottom: 1rem;
}

.fire-badges {
  display: flex;
  gap: 0.75rem;
  justify-content: center;
  flex-wrap: wrap;
  margin-top: 1.5rem;
}

.badge {
  padding: 0.35rem 1rem;
  border-radius: 100px;
  font-size: 0.75rem;
  font-weight: 500;
  letter-spacing: 0.05em;
}
.badge-members {
  background: var(--amber-pale);
  color: var(--amber);
  border: 1px solid var(--amber-light);
}
.badge-active {
  background: var(--sage-pale);
  color: var(--sage);
  border: 1px solid rgba(143,168,138,0.3);
}

/* Секции */
.section {
  background: var(--warm-white);
  border-radius: 1.5rem;
  border: 1px solid rgba(184,196,190,0.25);
  padding: 2rem 2.5rem;
  margin-bottom: 1.5rem;
  box-shadow: 0 4px 20px rgba(74,68,64,0.04);
}

.section-label {
  font-size: 0.65rem;
  font-weight: 500;
  letter-spacing: 0.3em;
  text-transform: uppercase;
  color: var(--sage);
  margin-bottom: 0.75rem;
  display: block;
}

.section-text {
  font-size: 1rem;
  font-weight: 300;
  color: var(--stone-dark);
  line-height: 1.8;
}

.contact-link {
  color: var(--amber);
  text-decoration: none;
  font-weight: 400;
  transition: opacity 0.2s;
}
.contact-link:hover { opacity: 0.7; }

/* Разделител */
.divider {
  display: flex;
  align-items: center;
  gap: 1rem;
  margin: 3rem 0 2rem;
}
.divider-line { flex: 1; height: 1px; background: rgba(184,196,190,0.4); }
.divider-icon { font-size: 1.2rem; color: var(--amber); opacity: 0.6; }

/* Giscus контейнер */
.comments-section {
  background: var(--warm-white);
  border-radius: 1.5rem;
  border: 1px solid rgba(184,196,190,0.25);
  padding: 2rem 2.5rem;
  box-shadow: 0 4px 20px rgba(74,68,64,0.04);
}

.comments-title {
  font-family: 'Cormorant Garamond', serif;
  font-size: 1.4rem;
  font-weight: 300;
  color: var(--stone-dark);
  margin-bottom: 1.5rem;
}

/* Loading и Error */
.loading-wrap {
  text-align: center;
  padding: 5rem 2rem;
}
.loading-fire { font-size: 3rem; animation: flicker 2s ease-in-out infinite; margin-bottom: 1rem; }
.loading-text { font-size: 0.9rem; font-weight: 300; color: var(--stone); }

.error-wrap {
  text-align: center;
  padding: 3rem;
  background: var(--amber-pale);
  border-radius: 1.5rem;
  border: 1px solid rgba(196,120,90,0.2);
}
.error-text { font-size: 0.9rem; color: var(--amber); }

footer {
  position: relative;
  z-index: 1;
  border-top: 1px solid rgba(184,196,190,0.3);
  padding: 2rem 4rem;
  display: flex;
  justify-content: space-between;
  align-items: center;
}
.footer-logo {
  font-family: 'Cormorant Garamond', serif;
  font-size: 1.1rem;
  font-weight: 600;
  color: var(--stone-dark);
  letter-spacing: 0.1em;
}
.footer-copy { font-size: 0.75rem; font-weight: 300; color: var(--stone); }

@media (max-width: 768px) {
  nav, footer { padding-left: 1.5rem; padding-right: 1.5rem; }
  .page-wrap { padding: 2rem 1.5rem 5rem; }
  .section { padding: 1.5rem; }
  .comments-section { padding: 1.5rem; }
}
</style>
</head>
<body>

<nav>
  <a class="logo" href="index.html">З<span>А</span>ЕДНО</a>
  <div class="nav-links">
    <a href="ognishta.html">Огнища</a>
    <a href="analiz.html">Анализ</a>
    <a href="register.html">Присъединяване</a>
  </div>
</nav>

<div class="page-wrap">
  <a class="back-link" href="ognishta.html">← Назад към огнищата</a>

  <div id="loading-state" class="loading-wrap">
    <div class="loading-fire">🔥</div>
    <div class="loading-text">Разпалваме огнището...</div>
  </div>

  <div id="error-state" class="error-wrap" style="display:none;">
    <div class="error-text">Огнището не беше намерено.</div>
  </div>

  <div id="content" style="display:none;">
    <div class="fire-header">
      <span class="fire-emoji">🔥</span>
      <span class="fire-label">Огнище</span>
      <h1 class="fire-name" id="fire-name">—</h1>
      <div class="fire-badges">
        <span class="badge badge-members" id="fire-members">1 член</span>
        <span class="badge badge-active">Активно</span>
      </div>
    </div>

    <div class="section" id="desc-section" style="display:none;">
      <span class="section-label">За огнището</span>
      <p class="section-text" id="fire-desc"></p>
    </div>

    <div class="section" id="contact-section" style="display:none;">
      <span class="section-label">Свържи се</span>
      <p class="section-text" id="fire-contact"></p>
    </div>

    <div class="divider">
      <div class="divider-line"></div>
      <div class="divider-icon">🌱</div>
      <div class="divider-line"></div>
    </div>

    <div class="comments-section">
      <div class="comments-title">Разговорът около огнището</div>
      <div id="giscus-container"></div>
    </div>
  </div>
</div>

<footer>
  <div class="footer-logo">ЗАЕДНО</div>
  <div class="footer-copy">Заедно за по-добър свят · 2026</div>
</footer>

<script>
const MAKE_GET_WEBHOOK = 'https://hook.eu1.make.com/v63ljepxc891k4xjtv6tkjp416w3xxi1';

function getIdFromUrl() {
  const params = new URLSearchParams(window.location.search);
  return params.get('id');
}

async function loadOgnishte() {
  const id = getIdFromUrl();
  if (!id) { showError(); return; }

  try {
    const res = await fetch(MAKE_GET_WEBHOOK, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ action: 'get' })
    });
    const text = await res.text();

    let records = [];
    const lines = text.trim().split('\n').filter(l => l.trim().startsWith('{'));
    for (const line of lines) {
      try { records.push(JSON.parse(line.trim())); } catch(e) {}
    }

    const record = records.find(r => r.id && r.id.trim() === id.trim());
    if (!record) { showError(); return; }

    renderOgnishte(record);
  } catch(e) {
    showError();
  }
}

function renderOgnishte(r) {
  document.title = `ЗАЕДНО — ${r['ИМЕ'] || 'Огнище'}`;

  document.getElementById('fire-name').textContent = r['ИМЕ'] || '—';
  document.getElementById('fire-members').textContent = `${r['ЧЛЕНОВЕ'] || 1} ${Number(r['ЧЛЕНОВЕ']) === 1 ? 'член' : 'члена'}`;

  if (r['ДЕТАЙЛИ']) {
    document.getElementById('fire-desc').textContent = r['ДЕТАЙЛИ'];
    document.getElementById('desc-section').style.display = 'block';
  }

  if (r['КОНТАКТ']) {
    const contact = r['КОНТАКТ'];
    const el = document.getElementById('fire-contact');
    if (contact.includes('@')) {
      el.innerHTML = `<a class="contact-link" href="mailto:${contact}">${contact}</a>`;
    } else {
      el.textContent = contact;
    }
    document.getElementById('contact-section').style.display = 'block';
  }

  document.getElementById('loading-state').style.display = 'none';
  document.getElementById('content').style.display = 'block';

  loadGiscus();
}

function loadGiscus() {
  const container = document.getElementById('giscus-container');
  const script = document.createElement('script');
  script.src = 'https://giscus.app/client.js';
  script.setAttribute('data-repo', 'metodihristov72/zaedno');
  script.setAttribute('data-repo-id', 'R_kgDORvw9Ng');
  script.setAttribute('data-category', 'General');
  script.setAttribute('data-category-id', 'DIC_kwDORvw9Ns4C5Z1n');
  script.setAttribute('data-mapping', 'pathname');
  script.setAttribute('data-strict', '0');
  script.setAttribute('data-reactions-enabled', '1');
  script.setAttribute('data-emit-metadata', '0');
  script.setAttribute('data-input-position', 'bottom');
  script.setAttribute('data-theme', 'preferred_color_scheme');
  script.setAttribute('data-lang', 'bg');
  script.setAttribute('crossorigin', 'anonymous');
  script.async = true;
  container.appendChild(script);
}

function showError() {
  document.getElementById('loading-state').style.display = 'none';
  document.getElementById('error-state').style.display = 'block';
}

loadOgnishte();
</script>
</body>
</html>
