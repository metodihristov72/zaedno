<!DOCTYPE html>
<html lang="bg">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ЗАЕДНО — Огнища</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --cream: #F7F3EE; --warm-white: #FDFAF7;
  --sage: #8FA88A; --sage-light: #C8D9C4; --sage-pale: #EBF2E9;
  --terracotta: #C4785A; --terracotta-light: #E8C4B0; --terracotta-pale: #FAF0EA;
  --stone: #8C8478; --stone-dark: #4A4440; --mist: #B8C4BE;
}
body { font-family: 'Jost', sans-serif; background: var(--cream); color: var(--stone-dark); min-height: 100vh; }

nav { display: flex; justify-content: space-between; align-items: center; padding: 2rem 4rem; border-bottom: 1px solid rgba(184,196,190,0.2); }
.logo { font-family: 'Cormorant Garamond', serif; font-size: 1.6rem; font-weight: 600; color: var(--stone-dark); letter-spacing: 0.12em; text-decoration: none; }
.logo span { color: var(--terracotta); }
.nav-links { display: flex; gap: 2rem; align-items: center; }
.nav-links a { font-size: 0.85rem; color: var(--stone); text-decoration: none; letter-spacing: 0.08em; transition: color 0.2s; }
.nav-links a:hover { color: var(--stone-dark); }

.lang-switcher { display: flex; gap: 0.3rem; align-items: center; }
.lang-btn { background: none; border: 1px solid transparent; border-radius: 6px; padding: 0.3rem 0.6rem; font-family: 'Jost', sans-serif; font-size: 0.72rem; font-weight: 400; letter-spacing: 0.1em; color: var(--stone); cursor: pointer; transition: all 0.2s ease; }
.lang-btn:hover { color: var(--stone-dark); border-color: var(--mist); }
.lang-btn.active { background: var(--terracotta-pale); border-color: var(--terracotta-light); color: var(--terracotta); font-weight: 500; }

.page-wrap { max-width: 1200px; margin: 0 auto; padding: 4rem 2rem 6rem; }

.page-header { display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 2.5rem; }
.page-label { font-size: 0.68rem; font-weight: 500; letter-spacing: 0.3em; text-transform: uppercase; color: var(--sage); margin-bottom: 0.5rem; display: block; }
.page-title { font-family: 'Cormorant Garamond', serif; font-size: clamp(2rem, 4vw, 3rem); font-weight: 300; line-height: 1.1; color: var(--stone-dark); }
.page-title em { font-style: italic; color: var(--terracotta); }

.reg-btn { background: var(--terracotta); color: white; border: none; border-radius: 100px; padding: 0.75rem 2rem; font-family: 'Jost', sans-serif; font-size: 0.85rem; font-weight: 400; letter-spacing: 0.1em; text-decoration: none; transition: background 0.3s ease; }
.reg-btn:hover { background: var(--stone-dark); }

.stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1rem; margin-bottom: 2rem; }
.stat-card { background: var(--warm-white); border-radius: 1.2rem; padding: 1.5rem; border: 1px solid rgba(184,196,190,0.3); text-align: center; }
.stat-num { font-family: 'Cormorant Garamond', serif; font-size: 2.5rem; font-weight: 300; color: var(--stone-dark); }
.stat-label { font-size: 0.72rem; color: var(--stone); letter-spacing: 0.15em; text-transform: uppercase; margin-top: 0.3rem; }

.search-bar { display: flex; gap: 0.75rem; margin-bottom: 2rem; }
.search-bar input { flex: 1; padding: 0.85rem 1.1rem; border: 1px solid rgba(184,196,190,0.5); border-radius: 10px; font-family: 'Jost', sans-serif; font-size: 0.9rem; font-weight: 300; color: var(--stone-dark); background: var(--warm-white); outline: none; transition: border-color 0.2s; }
.search-bar input:focus { border-color: var(--sage); }

.ognicha-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 1.5rem; }
.ognicha-card { background: var(--warm-white); border: 1px solid rgba(184,196,190,0.3); border-radius: 1.5rem; padding: 1.75rem; transition: border-color 0.2s, transform 0.2s; cursor: pointer; text-decoration: none; display: block; }
.ognicha-card:hover { border-color: var(--terracotta); transform: translateY(-2px); }
.card-top { display: flex; align-items: center; gap: 1rem; margin-bottom: 1rem; }
.fire-circle { width: 44px; height: 44px; border-radius: 50%; background: var(--terracotta-pale); display: flex; align-items: center; justify-content: center; flex-shrink: 0; font-size: 20px; }
.card-name { font-family: 'Cormorant Garamond', serif; font-size: 1.2rem; font-weight: 600; color: var(--stone-dark); }
.card-desc { font-size: 0.88rem; font-weight: 300; color: var(--stone); line-height: 1.6; margin-bottom: 1rem; }
.card-footer { display: flex; align-items: center; justify-content: space-between; }
.badge-members { background: var(--terracotta-pale); color: var(--terracotta); padding: 0.25rem 0.75rem; border-radius: 100px; font-size: 0.72rem; font-weight: 500; }

.loading { text-align: center; padding: 3rem; color: var(--stone); }
.empty { text-align: center; padding: 3rem; color: var(--stone); font-size: 0.9rem; }
.error-msg { background: var(--terracotta-pale); color: var(--terracotta); border-radius: 8px; padding: 0.75rem 1rem; margin-bottom: 1rem; font-size: 0.85rem; display: none; }

footer { border-top: 1px solid rgba(184,196,190,0.3); padding: 2rem 4rem; display: flex; justify-content: space-between; align-items: center; }
.footer-logo { font-family: 'Cormorant Garamond', serif; font-size: 1.1rem; font-weight: 600; color: var(--stone-dark); letter-spacing: 0.1em; }
.footer-copy { font-size: 0.75rem; font-weight: 300; color: var(--stone); }

@media (max-width: 768px) {
  nav { padding: 1rem 1.2rem; flex-wrap: wrap; gap: 0.75rem; }
  .nav-links { gap: 1rem; }
  .nav-links a { font-size: 0.8rem; }
  footer { padding: 1.5rem 1.2rem; flex-direction: column; gap: 0.5rem; text-align: center; }
  .page-wrap { padding: 2rem 1.2rem 4rem; }
  .page-header { flex-direction: column; align-items: flex-start; gap: 1rem; }
  .reg-btn { width: 100%; text-align: center; }
  .stats { grid-template-columns: repeat(3, 1fr); gap: 0.5rem; }
  .stat-card { padding: 1rem 0.5rem; }
  .stat-num { font-size: 1.8rem; }
  .stat-label { font-size: 0.62rem; }
  .ognicha-grid { grid-template-columns: 1fr; }
}
</style>
</head>
<body>

<nav>
  <a class="logo" href="index.html">З<span>А</span>ЕДНО</a>
  <div class="nav-links">
    <a href="ognishta.html" data-i18n="navHearths">Огнища</a>
    <a href="analiz.html" data-i18n="navAnalysis">Анализ</a>
    <a href="register.html" data-i18n="navJoin">Присъединяване</a>
  </div>
  <div class="lang-switcher">
    <button class="lang-btn active" onclick="setLang('bg',this)">БГ</button>
    <button class="lang-btn" onclick="setLang('en',this)">EN</button>
    <button class="lang-btn" onclick="setLang('de',this)">DE</button>
    <button class="lang-btn" onclick="setLang('ru',this)">РУ</button>
  </div>
</nav>

<div class="page-wrap">
  <div class="page-header">
    <div>
      <span class="page-label" data-i18n="pageLabel">Общността</span>
      <h1 class="page-title" data-i18n="pageTitle">Активни<br><em>огнища</em></h1>
    </div>
    <a class="reg-btn" href="register.html" data-i18n="regBtn">+ Регистрирай огнище</a>
  </div>

  <div class="stats">
    <div class="stat-card"><div class="stat-num" id="stat-total">—</div><div class="stat-label" data-i18n="statActive">Активни огнища</div></div>
    <div class="stat-card"><div class="stat-num" id="stat-cities">—</div><div class="stat-label" data-i18n="statCities">Града</div></div>
    <div class="stat-card"><div class="stat-num" id="stat-members">—</div><div class="stat-label" data-i18n="statMembers">Членове</div></div>
  </div>

  <div class="error-msg" id="error-msg" data-i18n="errorMsg">Грешка при зареждане. Опитайте по-късно.</div>

  <div class="search-bar">
    <input type="text" id="search-input" placeholder="Търси по име или описание..." oninput="filterCards()" />
  </div>

  <div class="loading" id="loading" data-i18n="loading">Зареждане на огнищата...</div>
  <div class="ognicha-grid" id="ognicha-grid"></div>
  <div class="empty" id="empty-state" style="display:none;" data-i18n="empty">Няма намерени огнища</div>
</div>

<footer>
  <div class="footer-logo">ЗАЕДНО</div>
  <div class="footer-copy" data-i18n="footerCopy">Заедно за по-добър свят · 2026</div>
</footer>

<script>
const MAKE_GET_WEBHOOK = 'https://hook.eu1.make.com/v63ljepxc891k4xjtv6tkjp416w3xxi1';
let allRecords = [];
let currentLang = 'bg';

const T = {
  bg: {
    navHearths: 'Огнища', navAnalysis: 'Анализ', navJoin: 'Присъединяване',
    pageLabel: 'Общността', pageTitle: 'Активни<br><em>огнища</em>',
    regBtn: '+ Регистрирай огнище',
    statActive: 'Активни огнища', statCities: 'Града', statMembers: 'Членове',
    errorMsg: 'Грешка при зареждане. Опитайте по-късно.',
    loading: 'Зареждане на огнищата...',
    empty: 'Няма намерени огнища',
    searchPlaceholder: 'Търси по име или описание...',
    memberSingular: 'член', memberPlural: 'члена',
    noDesc: 'Няма описание.',
    footerCopy: 'Заедно за по-добър свят · 2026',
  },
  en: {
    navHearths: 'Hearths', navAnalysis: 'Analysis', navJoin: 'Join',
    pageLabel: 'The community', pageTitle: 'Active<br><em>hearths</em>',
    regBtn: '+ Register a hearth',
    statActive: 'Active hearths', statCities: 'Cities', statMembers: 'Members',
    errorMsg: 'Loading error. Please try again later.',
    loading: 'Loading hearths...',
    empty: 'No hearths found',
    searchPlaceholder: 'Search by name or description...',
    memberSingular: 'member', memberPlural: 'members',
    noDesc: 'No description.',
    footerCopy: 'Together for a better world · 2026',
  },
  de: {
    navHearths: 'Herde', navAnalysis: 'Analyse', navJoin: 'Beitreten',
    pageLabel: 'Die Gemeinschaft', pageTitle: 'Aktive<br><em>Herde</em>',
    regBtn: '+ Herd registrieren',
    statActive: 'Aktive Herde', statCities: 'Städte', statMembers: 'Mitglieder',
    errorMsg: 'Ladefehler. Bitte versuchen Sie es später erneut.',
    loading: 'Herde werden geladen...',
    empty: 'Keine Herde gefunden',
    searchPlaceholder: 'Nach Name oder Beschreibung suchen...',
    memberSingular: 'Mitglied', memberPlural: 'Mitglieder',
    noDesc: 'Keine Beschreibung.',
    footerCopy: 'Gemeinsam für eine bessere Welt · 2026',
  },
  ru: {
    navHearths: 'Очаги', navAnalysis: 'Анализ', navJoin: 'Присоединиться',
    pageLabel: 'Сообщество', pageTitle: 'Активные<br><em>очаги</em>',
    regBtn: '+ Зарегистрировать очаг',
    statActive: 'Активные очаги', statCities: 'Города', statMembers: 'Участники',
    errorMsg: 'Ошибка загрузки. Попробуйте позже.',
    loading: 'Загрузка очагов...',
    empty: 'Очаги не найдены',
    searchPlaceholder: 'Поиск по названию или описанию...',
    memberSingular: 'участник', memberPlural: 'участников',
    noDesc: 'Нет описания.',
    footerCopy: 'Вместе для лучшего мира · 2026',
  }
};

function setLang(lang, btn) {
  currentLang = lang;
  document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
  if (btn) btn.classList.add('active');
  const t = T[lang];
  document.querySelectorAll('[data-i18n]').forEach(el => {
    const key = el.getAttribute('data-i18n');
    if (t[key] !== undefined) el.innerHTML = t[key];
  });
  document.getElementById('search-input').placeholder = t.searchPlaceholder;
  renderCards(allRecords);
}

async function loadFromAirtable() {
  try {
    const res = await fetch(MAKE_GET_WEBHOOK, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ action: 'GET' })
    });
    if (!res.ok) throw new Error('API error');
    const text = await res.text();

    let records = [];
    try {
      const parsed = JSON.parse(text);
      records = Array.isArray(parsed) ? parsed : [parsed];
    } catch(e) {
      try {
        const fixed = '[' + text.trim().replace(/\}\s*\{/g, '},{') + ']';
        records = JSON.parse(fixed);
      } catch(e2) {
        const lines = text.trim().split('\n').filter(l => l.trim().startsWith('{'));
        for (const line of lines) {
          try { records.push(JSON.parse(line.trim())); } catch(e3) {}
        }
      }
    }

    allRecords = records
      .filter(r => r && (r['ИМЕ'] || r.ime))
      .map(r => ({
        id:      r.id      || r['ID']      || '',
        name:    r['ИМЕ']  || r.ime        || '—',
        desc:    r['ДЕТАЙЛИ'] || r.detayli || '',
        members: r['ЧЛЕНОВЕ'] || r.chlenovе || 0,
        active:  true,
        contact: r['КОНТАКТ'] || r.kontakt || '',
      }));

    document.getElementById('loading').style.display = 'none';
    updateStats();
    renderCards(allRecords);
  } catch(e) {
    document.getElementById('loading').style.display = 'none';
    document.getElementById('error-msg').style.display = 'block';
  }
}

function updateStats() {
  document.getElementById('stat-total').textContent = allRecords.length;
  document.getElementById('stat-cities').textContent = '—';
  document.getElementById('stat-members').textContent = allRecords.reduce((s,o) => s + Number(o.members||0), 0);
}

function filterCards() {
  const q = document.getElementById('search-input').value.toLowerCase();
  const filtered = !q ? allRecords : allRecords.filter(o => {
    return o.name.toLowerCase().includes(q) || o.desc.toLowerCase().includes(q);
  });
  renderCards(filtered);
}

function renderCards(list) {
  const t = T[currentLang];
  const grid = document.getElementById('ognicha-grid');
  const empty = document.getElementById('empty-state');
  if (!list.length) { grid.innerHTML = ''; empty.style.display = 'block'; return; }
  empty.style.display = 'none';
  grid.innerHTML = list.map(o => `
    <a class="ognicha-card" href="ognishte.html?id=${encodeURIComponent(o.id.trim())}">
      <div class="card-top">
        <div class="fire-circle">🔥</div>
        <div class="card-name">${o.name}</div>
      </div>
      <div class="card-desc">${o.desc || t.noDesc}</div>
      <div class="card-footer">
        <span class="badge-members">${o.members || 0} ${Number(o.members) === 1 ? t.memberSingular : t.memberPlural}</span>
        <span class="card-arrow">→</span>
      </div>
    </a>`).join('');
}

setLang('bg');
loadFromAirtable();
</script>
</body>
</html>
