function animateCounter(target) {
  const el = document.getElementById('counter');
  if (!el) return;
  let current = 1;
  const step = Math.ceil(target / 40);
  const interval = setInterval(() => {
    current = Math.min(current + step, target);
    el.textContent = current;
    if (current >= target) clearInterval(interval);
  }, 40);
}
async function incrementVisit() {
  try {
    const res = await fetch(MAKE_WEBHOOK, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ action: 'increment_visit' })
    });
    const data = await res.json();
    if (data && data.посещения) animateCounter(data.посещения);
    else animateCounter(1);
  } catch(e) { animateCounter(1); }
}
function submitForm() {
  const name = document.getElementById('reg-name').value.trim();
  const email = document.getElementById('reg-email').value.trim();
  const problem = document.getElementById('reg-problem').value.trim();
  if (!name || !email) { document.getElementById('reg-name').focus(); return; }
  const btn = document.getElementById('reg-btn');
  btn.disabled = true; btn.textContent = '...';
  fetch('https://formspree.io/f/xkoqyzgk', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', 'Accept': 'application/json' },
    body: JSON.stringify({ name, email, problem })
  }).then(res => {
    if (res.ok) { document.getElementById('reg-form').style.display='none'; document.getElementById('reg-success').style.display='block'; }
    else { btn.disabled=false; btn.textContent='Опитай пак'; }
  }).catch(() => { document.getElementById('reg-form').style.display='none'; document.getElementById('reg-success').style.display='block'; });
}
function setLang(lang, btn) {
  document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
  if(btn) btn.classList.add('active');
  setTimeout(() => {
    document.querySelectorAll('[data-i18n]').forEach(el => {
      const key = el.getAttribute('data-i18n');
      if(T[lang][key] !== undefined) el.innerHTML = T[lang][key];
    });
    document.querySelectorAll('[data-placeholder]').forEach(el => {
      const key = el.getAttribute('data-placeholder');
      if(T[lang][key]) el.placeholder = T[lang][key];
    });
  }, 200);
}
window.addEventListener('DOMContentLoaded', () => {
  setLang('bg');
  incrementVisit();
  const obs = new IntersectionObserver((entries) => {
    entries.forEach((e,i) => { if(e.isIntersecting) setTimeout(() => e.target.classList.add('visible'), i*80); });
  }, { threshold: 0.1 });
  document.querySelectorAll('.reveal').forEach(el => obs.observe(el));
});
</script>
