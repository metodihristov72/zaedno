<!DOCTYPE html>
<html lang="bg">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ЗАЕДНО — Съединени, заедно можем повече</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --cream: #F7F3EE; --warm-white: #FDFAF7;
    --sage: #8FA88A; --sage-light: #C8D9C4; --sage-pale: #EBF2E9;
    --terracotta: #C4785A; --terracotta-light: #E8C4B0; --terracotta-pale: #FAF0EA;
    --stone: #8C8478; --stone-dark: #4A4440; --mist: #B8C4BE; --gold-soft: #C9A96E;
  }
  html { scroll-behavior: smooth; }
  body { font-family: 'Jost', sans-serif; background: var(--cream); color: var(--stone-dark); overflow-x: hidden; }

  /* LANG */
  .lang-switcher { display: flex; gap: 0.3rem; align-items: center; }
  .lang-btn { background: none; border: 1px solid transparent; border-radius: 6px; padding: 0.3rem 0.6rem; font-family: 'Jost', sans-serif; font-size: 0.72rem; font-weight: 400; letter-spacing: 0.1em; color: var(--stone); cursor: pointer; transition: all 0.2s ease; }
  .lang-btn:hover { color: var(--stone-dark); border-color: var(--mist); }
  .lang-btn.active { background: var(--terracotta-pale); border-color: var(--terracotta-light); color: var(--terracotta); font-weight: 500; }

  /* HERO */
  .hero { min-height: 100vh; display: grid; grid-template-rows: auto 1fr auto; position: relative; overflow: hidden; }
  .hero::before { content: ''; position: absolute; inset: 0; background: radial-gradient(ellipse 80% 60% at 20% 50%, rgba(143,168,138,0.18) 0%, transparent 60%), radial-gradient(ellipse 60% 80% at 80% 30%, rgba(196,120,90,0.10) 0%, transparent 60%), radial-gradient(ellipse 40% 40% at 60% 80%, rgba(201,169,110,0.10) 0%, transparent 50%); pointer-events: none; }
  nav { display: flex; justify-content: space-between; align-items: center; padding: 2rem 4rem; position: relative; z-index: 10; }
  .logo { font-family: 'Cormorant Garamond', serif; font-size: 1.6rem; font-weight: 600; color: var(--stone-dark); letter-spacing: 0.12em; }
  .logo span { color: var(--terracotta); }
  .hero-content { display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; padding: 4rem; position: relative; z-index: 10; }
  .hero-eyebrow { font-size: 0.72rem; font-weight: 500; letter-spacing: 0.25em; text-transform: uppercase; color: var(--stone); margin-bottom: 2rem; opacity: 0; animation: fadeUp 0.8s ease 0.2s forwards; }
  .hero-title { font-family: 'Cormorant Garamond', serif; font-size: clamp(4rem, 10vw, 9rem); font-weight: 300; line-height: 0.95; color: var(--stone-dark); margin-bottom: 1.5rem; opacity: 0; animation: fadeUp 0.8s ease 0.4s forwards; }
  .hero-title em { font-style: italic; color: var(--terracotta); }
  .hero-sub { font-family: 'Cormorant Garamond', serif; font-size: clamp(1.1rem, 2.5vw, 1.5rem); font-weight: 300; font-style: italic; color: var(--stone); max-width: 640px; line-height: 1.7; margin-bottom: 2rem; opacity: 0; animation: fadeUp 0.8s ease 0.6s forwards; }
  .hero-slogan { font-family: 'Cormorant Garamond', serif; font-size: clamp(1.2rem, 2.5vw, 1.6rem); font-weight: 600; color: var(--stone-dark); margin-bottom: 2rem; opacity: 0; animation: fadeUp 0.8s ease 0.7s forwards; letter-spacing: 0.03em; }
  .hero-slogan em { font-style: italic; color: var(--terracotta); }
  .hero-rule { font-size: 1rem; font-weight: 500; letter-spacing: 0.04em; color: var(--stone-dark); background: var(--terracotta-pale); border: 1px solid var(--terracotta-light); padding: 1rem 2.2rem; border-radius: 100px; opacity: 0; animation: fadeUp 0.8s ease 0.8s forwards; }
  .hero-rule strong { color: var(--terracotta); }
  .hero-scroll { padding: 2rem; display: flex; justify-content: center; position: relative; z-index: 10; opacity: 0; animation: fadeUp 0.8s ease 1.2s forwards; }
  .scroll-line { width: 1px; height: 60px; background: linear-gradient(to bottom, var(--mist), transparent); }

  /* SHARED */
  .divider { display: flex; align-items: center; gap: 1.5rem; margin: 1rem 0; }
  .divider-line { flex: 1; height: 1px; background: linear-gradient(to right, transparent, var(--mist), transparent); }
  .divider-dot { width: 5px; height: 5px; border-radius: 50%; background: var(--sage-light); }
  section { padding: 5rem 4rem; max-width: 1100px; margin: 0 auto; }
  .section-label { font-size: 0.68rem; font-weight: 500; letter-spacing: 0.3em; text-transform: uppercase; color: var(--sage); margin-bottom: 1rem; }
  .section-title { font-family: 'Cormorant Garamond', serif; font-size: clamp(2rem, 4vw, 3.2rem); font-weight: 300; line-height: 1.2; color: var(--stone-dark); margin-bottom: 1.5rem; }
  .section-title em { font-style: italic; color: var(--terracotta); }
  .section-body { font-size: 1rem; font-weight: 300; line-height: 1.85; color: var(--stone); max-width: 680px; }

  /* PHILOSOPHY */
  .philosophy { background: var(--warm-white); border-radius: 2rem; padding: 4rem; margin: 2rem 0; border: 1px solid rgba(143,168,138,0.2); position: relative; overflow: hidden; }
  .philosophy::before { content: '"'; font-family: 'Cormorant Garamond', serif; font-size: 20rem; color: var(--sage-pale); position: absolute; top: -4rem; left: 1rem; line-height: 1; pointer-events: none; }
  .philosophy-text { font-family: 'Cormorant Garamond', serif; font-size: clamp(1.3rem, 2.5vw, 1.8rem); font-weight: 300; font-style: italic; line-height: 1.6; color: var(--stone-dark); position: relative; z-index: 1; max-width: 700px; }
  .philosophy-author { margin-top: 1.5rem; font-size: 0.75rem; letter-spacing: 0.2em; text-transform: uppercase; color: var(--terracotta); font-weight: 400; position: relative; z-index: 1; }

  /* HOW IT WORKS - simple 3 steps */
  .steps { display: flex; flex-direction: column; gap: 1.5rem; margin-top: 3rem; }
  .step { display: flex; gap: 2rem; align-items: flex-start; background: var(--warm-white); border-radius: 1.5rem; padding: 2rem; border: 1px solid rgba(184,196,190,0.3); }
  .step-num { font-family: 'Cormorant Garamond', serif; font-size: 3rem; font-weight: 300; color: var(--terracotta); line-height: 1; min-width: 3rem; }
  .step-content {}
  .step-title { font-family: 'Cormorant Garamond', serif; font-size: 1.4rem; font-weight: 600; color: var(--stone-dark); margin-bottom: 0.5rem; }
  .step-body { font-size: 0.95rem; font-weight: 300; line-height: 1.8; color: var(--stone); }

  /* PILLARS */
  .pillars-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 1.5rem; margin-top: 3rem; }
  .pillar { background: var(--warm-white); border-radius: 1.5rem; padding: 2.5rem; border: 1px solid rgba(184,196,190,0.3); transition: transform 0.3s ease, box-shadow 0.3s ease; position: relative; overflow: hidden; }
  .pillar::after { content: ''; position: absolute; bottom: 0; left: 0; right: 0; height: 3px; background: linear-gradient(to right, var(--sage-light), var(--terracotta-light)); opacity: 0; transition: opacity 0.3s ease; }
  .pillar:hover { transform: translateY(-4px); box-shadow: 0 20px 40px rgba(74,68,64,0.08); }
  .pillar:hover::after { opacity: 1; }
  .pillar-icon { font-size: 2rem; margin-bottom: 1rem; display: block; }
  .pillar-title { font-family: 'Cormorant Garamond', serif; font-size: 1.3rem; font-weight: 600; color: var(--stone-dark); margin-bottom: 0.75rem; }
  .pillar-body { font-size: 0.88rem; font-weight: 300; line-height: 1.8; color: var(--stone); }

  /* LIFECYCLE */
  .lifecycle { display: flex; margin-top: 3rem; position: relative; }
  .lifecycle::before { content: ''; position: absolute; top: 2.5rem; left: 2.5rem; right: 2.5rem; height: 1px; background: linear-gradient(to right, var(--sage-light), var(--terracotta-light), var(--gold-soft)); }
  .lifecycle-step { flex: 1; text-align: center; padding: 0 1rem; position: relative; }
  .lifecycle-dot { width: 5rem; height: 5rem; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 1.5rem; margin: 0 auto 1rem; position: relative; z-index: 1; border: 2px solid transparent; transition: transform 0.3s ease; }
  .lifecycle-step:hover .lifecycle-dot { transform: scale(1.1); }
  .lifecycle-step:nth-child(1) .lifecycle-dot { background: var(--sage-pale); border-color: var(--sage-light); }
  .lifecycle-step:nth-child(2) .lifecycle-dot { background: #EEF0F8; border-color: #B8BDD9; }
  .lifecycle-step:nth-child(3) .lifecycle-dot { background: var(--terracotta-pale); border-color: var(--terracotta-light); }
  .lifecycle-step:nth-child(4) .lifecycle-dot { background: #F5F0E8; border-color: var(--gold-soft); }
  .lifecycle-step:nth-child(5) .lifecycle-dot { background: var(--sage-pale); border-color: var(--sage); }
  .lifecycle-label { font-family: 'Cormorant Garamond', serif; font-size: 1rem; font-weight: 600; color: var(--stone-dark); margin-bottom: 0.4rem; }
  .lifecycle-desc { font-size: 0.75rem; font-weight: 300; color: var(--stone); line-height: 1.5; }

  /* ONE RULE */
  .one-rule { background: linear-gradient(135deg, var(--sage-pale) 0%, var(--terracotta-pale) 100%); border-radius: 2rem; padding: 5rem 4rem; text-align: center; border: 1px solid rgba(143,168,138,0.25); margin: 3rem 0; }
  .one-rule-label { font-size: 0.68rem; letter-spacing: 0.3em; text-transform: uppercase; color: var(--sage); margin-bottom: 1.5rem; display: block; }
  .one-rule-text { font-family: 'Cormorant Garamond', serif; font-size: clamp(1.8rem, 4vw, 3rem); font-weight: 300; font-style: italic; color: var(--stone-dark); line-height: 1.4; margin-bottom: 1rem; }
  .one-rule-sub { font-size: 0.88rem; font-weight: 300; color: var(--stone); letter-spacing: 0.05em; }

  /* CTA */
  .cta-section { text-align: center; padding: 6rem 4rem; }
  .cta-title { font-family: 'Cormorant Garamond', serif; font-size: clamp(2rem, 4vw, 3rem); font-weight: 300; color: var(--stone-dark); margin-bottom: 1rem; }
  .cta-title em { font-style: italic; color: var(--terracotta); }
  .cta-sub { font-size: 0.9rem; font-weight: 300; color: var(--stone); margin-bottom: 2rem; line-height: 1.7; white-space: pre-line; }
  .cta-btn { display: inline-block; background: var(--terracotta); color: white; padding: 1rem 3rem; border-radius: 100px; font-size: 0.85rem; font-weight: 400; letter-spacing: 0.12em; text-transform: uppercase; text-decoration: none; border: none; cursor: pointer; transition: background 0.3s ease, transform 0.2s ease; font-family: 'Jost', sans-serif; }
  .cta-btn:hover { background: var(--stone-dark); transform: translateY(-2px); }

  /* COUNTER */
  .counter-wrap { margin: 0 auto 2.5rem; display: inline-block; background: var(--sage-pale); border: 1px solid var(--sage-light); border-radius: 1.5rem; padding: 1.2rem 3rem; }
  .counter-num { font-family: 'Cormorant Garamond', serif; font-size: 3.5rem; font-weight: 300; color: var(--stone-dark); line-height: 1; }
  .counter-label { font-size: 0.75rem; letter-spacing: 0.2em; text-transform: uppercase; color: var(--sage); margin-top: 0.3rem; }

  /* FORM */
  .reg-form { max-width: 500px; margin: 0 auto; display: flex; flex-direction: column; gap: 1rem; }
  .reg-input { width: 100%; padding: 0.9rem 1.2rem; border: 1px solid rgba(184,196,190,0.5); border-radius: 12px; font-family: 'Jost', sans-serif; font-size: 0.9rem; font-weight: 300; color: var(--stone-dark); background: var(--warm-white); outline: none; transition: border-color 0.2s ease; resize: none; box-sizing: border-box; }
  .reg-input:focus { border-color: var(--sage); }
  .reg-textarea { min-height: 100px; }
  .reg-note { font-size: 0.72rem; color: var(--stone); margin-top: 0.3rem; letter-spacing: 0.05em; }

  /* SUCCESS */
  .reg-success { text-align: center; padding: 2rem; }
  .success-icon { font-size: 3rem; margin-bottom: 1rem; }
  .success-title { font-family: 'Cormorant Garamond', serif; font-size: 1.8rem; font-weight: 300; color: var(--stone-dark); margin-bottom: 0.5rem; }
  .success-sub { font-size: 0.9rem; color: var(--stone); line-height: 1.7; }

  /* HEARTH SECTION */
  .hearth-section { text-align: center; padding: 2rem 4rem 6rem; }
  .hearth-label { font-size: 0.8rem; letter-spacing: 0.15em; text-transform: uppercase; color: var(--stone); margin-bottom: 1rem; }
  .hearth-btn { background: none; border: 2px solid var(--terracotta); color: var(--terracotta); padding: 0.9rem 2.5rem; border-radius: 100px; font-family: 'Jost', sans-serif; font-size: 0.85rem; font-weight: 400; letter-spacing: 0.12em; text-transform: uppercase; cursor: pointer; transition: all 0.3s ease; }
  .hearth-btn:hover { background: var(--terracotta); color: white; transform: translateY(-2px); }
  .hearth-modal { position: fixed; inset: 0; background: rgba(74,68,64,0.6); z-index: 100; display: flex; align-items: center; justify-content: center; padding: 2rem; backdrop-filter: blur(4px); }
  .hearth-modal-inner { background: var(--warm-white); border-radius: 2rem; padding: 3rem; max-width: 480px; width: 100%; text-align: center; }
  .hearth-modal-title { font-family: 'Cormorant Garamond', serif; font-size: 1.6rem; font-weight: 300; color: var(--stone-dark); margin-bottom: 1.5rem; }
  .hearth-cancel { background: none; border: 1px solid var(--mist); color: var(--stone); padding: 1rem 2rem; border-radius: 100px; font-family: 'Jost', sans-serif; font-size: 0.85rem; cursor: pointer; transition: all 0.2s ease; }
  .hearth-cancel:hover { border-color: var(--stone); color: var(--stone-dark); }

  /* FOOTER */
  footer { border-top: 1px solid rgba(184,196,190,0.3); padding: 2.5rem 4rem; display: flex; justify-content: space-between; align-items: center; }
  .footer-logo { font-family: 'Cormorant Garamond', serif; font-size: 1.1rem; font-weight: 600; color: var(--stone-dark); letter-spacing: 0.1em; }
  .footer-copy { font-size: 0.75rem; font-weight: 300; color: var(--stone); }

  /* ANIMATIONS */
  @keyframes fadeUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
  .reveal { opacity: 0; transform: translateY(24px); transition: opacity 0.7s ease, transform 0.7s ease; }
  .reveal.visible { opacity: 1; transform: translateY(0); }
  [data-i18n] { transition: opacity 0.2s ease; }
  .lang-fade { opacity: 0; }

  @media (max-width: 768px) {
    nav, section, footer { padding-left: 2rem; padding-right: 2rem; }
    .pillars-grid { grid-template-columns: 1fr; }
    .lifecycle { flex-direction: column; gap: 2rem; }
    .lifecycle::before { display: none; }
    .philosophy, .one-rule { padding: 2.5rem 2rem; }
    .step { flex-direction: column; gap: 1rem; }
  }
</style>
</head>
<body>

<div class="hero">
  <nav>
    <div class="logo">З<span>А</span>ЕДНО</div>
    <div style="display:flex;align-items:center;gap:2rem;">
      <a href="ognishta.html" style="font-family:'Jost',sans-serif;font-size:0.85rem;color:var(--stone);text-decoration:none;letter-spacing:0.08em;transition:color 0.2s" onmouseover="this.style.color='var(--stone-dark)'" onmouseout="this.style.color='var(--stone)'">Огнища</a>
      <a href="analiz.html" style="font-family:'Jost',sans-serif;font-size:0.85rem;color:var(--stone);text-decoration:none;letter-spacing:0.08em;transition:color 0.2s" onmouseover="this.style.color='var(--stone-dark)'" onmouseout="this.style.color='var(--stone)'">Анализ</a>
    </div>
    <div class="lang-switcher">
      <button class="lang-btn active" onclick="setLang('bg',this)">БГ</button>
      <button class="lang-btn" onclick="setLang('en',this)">EN</button>
      <button class="lang-btn" onclick="setLang('de',this)">DE</button>
      <button class="lang-btn" onclick="setLang('ru',this)">РУ</button>
    </div>
  </nav>
  <div class="hero-content">
    <div class="hero-eyebrow" data-i18n="eyebrow"></div>
    <h1 class="hero-title" data-i18n="title"></h1>
    <p class="hero-sub" data-i18n="sub"></p>
    <div class="hero-slogan" data-i18n="slogan"></div>
    <div class="hero-rule" data-i18n="rule"></div>
  </div>
  <div class="hero-scroll"><div class="scroll-line"></div></div>
</div>

<!-- PHILOSOPHY -->
<section>
  <div class="divider reveal"><div class="divider-line"></div><div class="divider-dot"></div><div class="divider-line"></div></div>
  <div class="philosophy reveal">
    <p class="philosophy-text" data-i18n="philosophy"></p>
    <div class="philosophy-author" data-i18n="philosophyAuthor"></div>
  </div>
</section>

<!-- HOW IT WORKS - 3 simple steps -->
<section>
  <div class="reveal">
    <div class="section-label" data-i18n="howLabel"></div>
    <h2 class="section-title" data-i18n="howTitle"></h2>
    <p class="section-body" data-i18n="howSub"></p>
  </div>
  <div class="steps">
    <div class="step reveal">
      <div class="step-num">1</div>
      <div class="step-content">
        <div class="step-title" data-i18n="s1title"></div>
        <p class="step-body" data-i18n="s1body"></p>
      </div>
    </div>
    <div class="step reveal">
      <div class="step-num">2</div>
      <div class="step-content">
        <div class="step-title" data-i18n="s2title"></div>
        <p class="step-body" data-i18n="s2body"></p>
      </div>
    </div>
    <div class="step reveal">
      <div class="step-num">3</div>
      <div class="step-content">
        <div class="step-title" data-i18n="s3title"></div>
        <p class="step-body" data-i18n="s3body"></p>
      </div>
    </div>
  </div>
</section>

<!-- PILLARS -->
<section>
  <div class="reveal">
    <div class="section-label" data-i18n="pillarsLabel"></div>
    <h2 class="section-title" data-i18n="pillarsTitle"></h2>
    <p class="section-body" data-i18n="pillarsSub"></p>
  </div>
  <div class="pillars-grid">
    <div class="pillar reveal"><span class="pillar-icon">🌳</span><div class="pillar-title" data-i18n="p1title"></div><p class="pillar-body" data-i18n="p1body"></p></div>
    <div class="pillar reveal"><span class="pillar-icon">🥚</span><div class="pillar-title" data-i18n="p2title"></div><p class="pillar-body" data-i18n="p2body"></p></div>
    <div class="pillar reveal"><span class="pillar-icon">🔥</span><div class="pillar-title" data-i18n="p3title"></div><p class="pillar-body" data-i18n="p3body"></p></div>
    <div class="pillar reveal"><span class="pillar-icon">🤝</span><div class="pillar-title" data-i18n="p4title"></div><p class="pillar-body" data-i18n="p4body"></p></div>
  </div>
</section>

<!-- LIFECYCLE -->
<section>
  <div class="reveal">
    <div class="section-label" data-i18n="lifecycleLabel"></div>
    <h2 class="section-title" data-i18n="lifecycleTitle"></h2>
    <p class="section-body" data-i18n="lifecycleSub"></p>
  </div>
  <div class="lifecycle reveal">
    <div class="lifecycle-step"><div class="lifecycle-dot">🌱</div><div class="lifecycle-label" data-i18n="l1"></div><div class="lifecycle-desc" data-i18n="l1d"></div></div>
    <div class="lifecycle-step"><div class="lifecycle-dot">🥚</div><div class="lifecycle-label" data-i18n="l2"></div><div class="lifecycle-desc" data-i18n="l2d"></div></div>
    <div class="lifecycle-step"><div class="lifecycle-dot">🔥</div><div class="lifecycle-label" data-i18n="l3"></div><div class="lifecycle-desc" data-i18n="l3d"></div></div>
    <div class="lifecycle-step"><div class="lifecycle-dot">🧑</div><div class="lifecycle-label" data-i18n="l4"></div><div class="lifecycle-desc" data-i18n="l4d"></div></div>
    <div class="lifecycle-step"><div class="lifecycle-dot">🏛️</div><div class="lifecycle-label" data-i18n="l5"></div><div class="lifecycle-desc" data-i18n="l5d"></div></div>
  </div>
</section>

<!-- ONE RULE -->
<section>
  <div class="one-rule reveal">
    <span class="one-rule-label" data-i18n="ruleLabel"></span>
    <div class="one-rule-text" data-i18n="ruleText"></div>
    <div class="one-rule-sub" data-i18n="ruleSub"></div>
  </div>
</section>

<!-- CTA + REGISTRATION FORM -->
<div class="cta-section reveal">
  <h2 class="cta-title" data-i18n="ctaTitle"></h2>
  <p class="cta-sub" data-i18n="ctaSub"></p>

  <!-- COUNTER -->
  <div class="counter-wrap">
    <div class="counter-num" id="counter">1</div>
    <div class="counter-label" data-i18n="counterLabel"></div>
  </div>

  <!-- FORM -->
  <div class="reg-form" id="reg-form">
    <input class="reg-input" type="text" id="reg-name" data-placeholder="namePlaceholder" placeholder="Твоето име" />
    <input class="reg-input" type="email" id="reg-email" data-placeholder="emailPlaceholder" placeholder="Твоят имейл" />
    <textarea class="reg-input reg-textarea" id="reg-problem" data-placeholder="problemPlaceholder" placeholder="Какъв проблем искаш да решиш заедно с други хора?"></textarea>
    <button class="cta-btn" onclick="submitForm()" id="reg-btn" data-i18n="ctaBtn"></button>
    <p class="reg-note" data-i18n="regNote"></p>
  </div>

  <!-- SUCCESS -->
  <div class="reg-success" id="reg-success" style="display:none;">
    <div class="success-icon">🌱</div>
    <div class="success-title" data-i18n="successTitle"></div>
    <div class="success-sub" data-i18n="successSub"></div>
  </div>
</div>

<!-- HEARTH BUTTON -->
<div class="hearth-section reveal">
  <div class="hearth-label" data-i18n="hearthLabel"></div>

// ── COUNTER ──────────────────────────────────────────────────────
let baseCount = 1;
try {
  const stored = localStorage.getItem('zaedno_count');
  if (stored) baseCount = parseInt(stored);
} catch(e) {}

function animateCounter(target) {
  const el = document.getElementById('counter');
  if (!el) return;
  let current = 1;
  const step = Math.ceil(target / 40);
  const interval = setInterval(() => {
    current = Math.min(current + step, target);
    el.textContent = current;
    if (current >= target) clearInterval(interval);
  }, 40);
}

// ── FORM SUBMISSION ──────────────────────────────────────────────
function submitForm() {
  const name = document.getElementById('reg-name').value.trim();
  const email = document.getElementById('reg-email').value.trim();
  const problem = document.getElementById('reg-problem').value.trim();
  if (!name || !email) {
    document.getElementById('reg-name').focus();
    return;
  }

  // Send to Formspree
  const btn = document.getElementById('reg-btn');
  btn.disabled = true;
  btn.textContent = '...';

  fetch('https://formspree.io/f/xkoqyzgk', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', 'Accept': 'application/json' },
    body: JSON.stringify({ name, email, problem })
  })
  .then(res => {
    if (res.ok) {
      // Save locally for counter
      const entries = JSON.parse(localStorage.getItem('zaedno_entries') || '[]');
      entries.push({ name, email, problem, date: new Date().toISOString() });
      localStorage.setItem('zaedno_entries', JSON.stringify(entries));
      baseCount = entries.length + 1;
      localStorage.setItem('zaedno_count', baseCount);
      animateCounter(baseCount);
      // Show success
      document.getElementById('reg-form').style.display = 'none';
      document.getElementById('reg-success').style.display = 'block';
    } else {
      btn.disabled = false;
      btn.textContent = 'Опитай пак';
    }
  })
  .catch(() => {
    // Fallback - save locally even if network fails
    document.getElementById('reg-form').style.display = 'none';
    document.getElementById('reg-success').style.display = 'block';
  });
}

// ── HEARTH ────────────────────────────────────────────────────────
function openHearth() {
  window.location.href = 'register.html';
}

function closeHearth() {
  document.getElementById('hearth-modal').style.display = 'none';
  document.body.style.overflow = '';
}

function submitHearth() {
  const topic = document.getElementById('hearth-topic').value.trim();
  const email = document.getElementById('hearth-email').value.trim();
  if (!topic || !email) return;
  const hearths = JSON.parse(localStorage.getItem('zaedno_hearths') || '[]');
  hearths.push({ topic, email, date: new Date().toISOString() });
  localStorage.setItem('zaedno_hearths', JSON.stringify(hearths));
  closeHearth();
  alert('🔥 Огнището е запалено! Ще те свържем с хора около тази тема.');
}

  setTimeout(() => {
    els.forEach(el => {
      const key = el.getAttribute('data-i18n');
      if(T[lang][key] !== undefined) el.innerHTML = T[lang][key];
    });
    // Update placeholders
    document.querySelectorAll('[data-placeholder]').forEach(el => {
      const key = el.getAttribute('data-placeholder');
      if(T[lang][key]) el.placeholder = T[lang][key];
    });
    els.forEach(el => el.classList.remove('lang-fade'));
  }, 200);
}

window.addEventListener('DOMContentLoaded', () => {
  setLang('bg');
  animateCounter(baseCount);
  const obs = new IntersectionObserver((entries) => {
    entries.forEach((e,i) => { if(e.isIntersecting) setTimeout(() => e.target.classList.add('visible'), i*80); });
  }, { threshold: 0.1 });
  document.querySelectorAll('.reveal').forEach(el => obs.observe(el));
});
</script>
</body>
